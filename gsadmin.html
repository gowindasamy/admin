<!DOCTYPE html>
<html>
<head>
<title>👑 Admin Page</title>

<style>

body{
margin:0;
padding:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

.userbox{
background:rgba(255,255,255,0.08);
width:340px;
margin:20px auto;
padding:18px;
border-radius:15px;
box-shadow:0 0 20px lime;
}

button{
padding:12px 25px;
background:lime;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin:10px;
font-weight:bold;
}

input{
padding:15px;
margin:12px;
width:280px;
font-size:18px;
border:none;
border-radius:12px;
outline:none;
}

</style>
</head>

<body>

<script>

let adminpass =
prompt("Enter Admin Password");

if(adminpass != "gsadmin"){

alert("Access Denied ❌");

window.location.href =
"https://gowindasamy.github.io/login/login.html";

}

</script>

<h1>👑 ADMIN PAGE 👑</h1>

<input type="text"
id="username"
placeholder="Create Username">

<br>

<input type="password"
id="password"
placeholder="Create Password">

<br>

<button onclick="saveUser()">
🚀 Create Login
</button>

<div id="history"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
collection,
getDocs,
deleteDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAV9WmHR_cY01i3UMLpwlbymjjz_sQT_80",

authDomain: "tngslogin.firebaseapp.com",

projectId: "tngslogin",

storageBucket: "tngslogin.firebasestorage.app",

messagingSenderId: "552680193680",

appId: "1:552680193680:web:54db58e0e418a2b63aa215"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.saveUser = async function(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

await setDoc(doc(db,"users",username),{

password: password

});

alert("Login Created 🚀");

loadUsers();

}

async function loadUsers(){

const querySnapshot =
await getDocs(collection(db,"users"));

let html = "";

querySnapshot.forEach((docu)=>{

html += `

<div class="userbox">

<h2>👤 ${docu.id}</h2>

<p>
🔑 Password:
${docu.data().password}
</p>

<h3>📅 Login History</h3>

${
docu.data().loginHistory

? docu.data().loginHistory.map(log => `

<p>
📅 ${log.date}
</p>

<p>
🕒 ${log.time}
</p>

<hr>

`).join("")

: "No Login"

}

<button onclick="removeUser('${docu.id}')">
❌ Remove User
</button>

</div>

`;

});

document.getElementById("history").innerHTML = html;

}

window.removeUser = async function(username){

await deleteDoc(doc(db,"users",username));

alert("User Removed ❌");

loadUsers();

}

loadUsers();

</script>

</body>
</html>
