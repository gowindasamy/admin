<!DOCTYPE html>
<html>
<head>
<title>👑 Admin Page</title>

<style>

body{
margin:0;
padding:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

/* Stars Background */

.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
black url("https://www.transparenttextures.com/patterns/stardust.png");
animation:starsMove 60s linear infinite;
z-index:-1;
opacity:0.9;
}

/* Title */

h1{
margin-top:50px;
font-size:50px;
animation:rainbow 4s linear infinite;
text-shadow:
0 0 10px red,
0 0 20px cyan,
0 0 30px lime;
}

/* Inputs */

input{
padding:15px;
margin:12px;
width:280px;
font-size:18px;
border:none;
border-radius:12px;
outline:none;
background:rgba(255,255,255,0.08);
color:white;
box-shadow:0 0 20px lime;
}

/* Buttons */

button{
padding:15px 30px;
background:linear-gradient(
45deg,
lime,
cyan
);
border:none;
border-radius:12px;
font-size:20px;
cursor:pointer;
font-weight:bold;
color:black;
box-shadow:0 0 25px cyan;
transition:0.3s;
margin:8px;
}

button:hover{
transform:scale(1.1);
}

/* User Box */

.userbox{
background:rgba(255,255,255,0.08);
width:340px;
margin:20px auto;
padding:18px;
border-radius:15px;
box-shadow:0 0 20px lime;
word-wrap:break-word;
}

hr{
border:1px solid cyan;
}

/* Animations */

@keyframes rainbow{

0%{color:red;}
20%{color:orange;}
40%{color:yellow;}
60%{color:lime;}
80%{color:cyan;}
100%{color:magenta;}

}

@keyframes starsMove{

from{
background-position:0 0;
}

to{
background-position:0 1000px;
}

}

</style>

<!-- html2canvas -->

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</head>

<body>

<div class="stars"></div>

<h1>👑 ADMIN PAGE 👑</h1>

<input type="text"
id="username"
placeholder="Create Username">

<br>

<input type="password"
id="password"
placeholder="Create Password">

<br>

<button onclick="saveUser()">
🚀 Create Login
</button>

<h2 style="color:cyan;">
📜 User Information
</h2>

<div id="history"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
collection,
getDocs,
deleteDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAV9WmHR_cY01i3UMLpwlbymjjz_sQT_80",

authDomain: "tngslogin.firebaseapp.com",

projectId: "tngslogin",

storageBucket: "tngslogin.firebasestorage.app",

messagingSenderId: "552680193680",

appId: "1:552680193680:web:54db58e0e418a2b63aa215"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.saveUser = async function(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

await setDoc(doc(db,"users",username),{

password: password

});

alert("Login Created 🚀");

document.getElementById("username").value = "";

document.getElementById("password").value = "";

loadUsers();

}

async function loadUsers(){

const querySnapshot =
await getDocs(collection(db,"users"));

let html = "";

querySnapshot.forEach((docu)=>{

html += `

<div class="userbox"
data-user="${docu.id}">

<h3>👤 User Information</h3>

<p><b>Username:</b> ${docu.id}</p>

<p><b>Password:</b> ${docu.data().password}</p>

<h3 style="color:cyan;">
📅 Login History
</h3>

${
docu.data().loginHistory

? docu.data().loginHistory.map(log => `

<p>
📅 ${log.date}
</p>

<p>
🕒 ${log.time}
</p>

<hr>

`).join("")

: "No Login"

}

<button onclick="downloadUser('${docu.id}')">
📥 Download
</button>

<button onclick="removeUser('${docu.id}')">
❌ Remove User
</button>

</div>

`;

});

document.getElementById("history").innerHTML = html;

}

window.removeUser = async function(username){

await deleteDoc(doc(db,"users",username));

alert("User Removed ❌");

loadUsers();

}

window.downloadUser = async function(username){

const element =
document.querySelector(
`[data-user="${username}"]`
);

html2canvas(element).then(canvas => {

const link =
document.createElement("a");

link.download =
username + "_history.png";

link.href =
canvas.toDataURL();

link.click();

});

}

loadUsers();

</script>

</body>
</html>
