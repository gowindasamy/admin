<!DOCTYPE html>
<html>
<head>

<title>👑 ADMIN PAGE 👑</title>

<style>

body{
margin:0;
padding:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

/* BACKGROUND */

#wavebg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
background:black;
}

#wavebg::before{

content:"";

position:absolute;
top:20%;
left:-50%;

width:200%;
height:300px;

background:
rgba(0,255,255,0.15);

border-radius:45%;

filter:blur(60px);

animation:waveMove 10s linear infinite;

}

#wavebg::after{

content:"";

position:absolute;
bottom:10%;
left:-50%;

width:200%;
height:250px;

background:
rgba(0,255,0,0.12);

border-radius:40%;

filter:blur(70px);

animation:waveMove2 14s linear infinite;

}

/* ANIMATION */

@keyframes waveMove{

0%{
transform:
translateX(0)
translateY(0)
rotate(0deg);
}

50%{
transform:
translateX(10%)
translateY(20px)
rotate(2deg);
}

100%{
transform:
translateX(0)
translateY(0)
rotate(0deg);
}

}

@keyframes waveMove2{

0%{
transform:
translateX(0)
translateY(0)
rotate(0deg);
}

50%{
transform:
translateX(-10%)
translateY(-20px)
rotate(-2deg);
}

100%{
transform:
translateX(0)
translateY(0)
rotate(0deg);
}

}

/* TITLE */

h1{
margin-top:50px;
font-size:50px;
animation:rainbow 4s linear infinite;
text-shadow:
0 0 10px red,
0 0 20px cyan,
0 0 30px lime;
}

/* INPUT */

input{

padding:15px;

margin:12px;

width:280px;

font-size:18px;

border:none;

border-radius:12px;

outline:none;

background:
rgba(255,255,255,0.08);

color:white;

box-shadow:
0 0 20px cyan;

}

/* ACCESS BOX */

#accessBox{

width:280px;

margin:20px auto;

background:
rgba(255,255,255,0.05);

padding:15px;

border-radius:15px;

box-shadow:
0 0 20px cyan;

}

.check{

display:flex;

align-items:center;

gap:12px;

margin:14px 0;

font-size:20px;

cursor:pointer;

justify-content:flex-start;

}

.check input{

width:22px;
height:22px;

accent-color:cyan;

cursor:pointer;

}

.check span{

color:white;

font-weight:bold;

}

/* BUTTON */

button{

padding:14px 28px;

background:
linear-gradient(
135deg,
#00ffff,
#00ff99,
#00ccff
);

border:none;

border-radius:14px;

font-size:17px;

cursor:pointer;

font-weight:bold;

color:black;

box-shadow:
0 0 15px cyan,
0 0 30px rgba(0,255,255,0.4);

transition:0.35s;

margin:8px;

}

button:hover{

transform:
translateY(-3px)
scale(1.05);

box-shadow:
0 0 25px cyan,
0 0 45px rgba(0,255,255,0.7);

}

/* USER BOX */

.userbox{

background:
rgba(0,0,0,0.75);

width:340px;

margin:20px auto;

padding:18px;

border-radius:15px;

box-shadow:
0 0 20px cyan;

word-wrap:break-word;

border:2px solid cyan;

backdrop-filter:blur(6px);

}

.popup{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:
rgba(0,0,0,0.85);

display:flex;

justify-content:center;
align-items:center;

z-index:9999;

}

.popupbox{

background:black;

padding:30px;

border-radius:20px;

box-shadow:
0 0 30px cyan;

width:320px;

position:relative;

}

.close{

position:absolute;

top:10px;
right:15px;

font-size:28px;

font-weight:bold;

color:red;

cursor:pointer;

}

hr{
border:1px solid cyan;
}

@keyframes rainbow{

0%{color:red;}
20%{color:orange;}
40%{color:yellow;}
60%{color:lime;}
80%{color:cyan;}
100%{color:magenta;}

}

</style>

</head>

<body>

<div id="wavebg"></div>

<h1>👑 ADMIN PAGE 👑</h1>

<input
type="text"
id="username"
placeholder="Create Username">

<br>

<input
type="password"
id="password"
placeholder="Create Password">

<!-- ACCESS -->

<div id="accessBox">

<label class="check">

<input
type="checkbox"
value="jee">

<span>
🔥 JEE
</span>

</label>

<label class="check">

<input
type="checkbox"
value="12th">

<span>
📚 12TH
</span>

</label>

<label class="check">

<input
type="checkbox"
value="topperzone">

<span>
🚀 TOPPERZONE
</span>

</label>

</div>

<button onclick="saveUser()">
🚀 CREATE LOGIN
</button>

<h2 style="color:cyan;">
📜 USER INFORMATION
</h2>

<div id="history"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
setDoc,
collection,
getDocs,
deleteDoc,
updateDoc,
getDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyAV9WmHR_cY01i3UMLpwlbymjjz_sQT_80",

authDomain:
"tngslogin.firebaseapp.com",

projectId:
"tngslogin",

storageBucket:
"tngslogin.firebasestorage.app",

messagingSenderId:
"552680193680",

appId:
"1:552680193680:web:54db58e0e418a2b63aa215"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* CREATE USER */

window.saveUser =
async function(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

/* ACCESS */

let access =

Array.from(

document.querySelectorAll(
'#accessBox input:checked'
)

).map(
checkbox => checkbox.value
);

await setDoc(
doc(db,"users",username),
{

password:password,

pageAccess:access,

status:"unlocked",

loginLimit:999999,

loginCount:0,

loginHistory:[]

}

);

alert("Login Created 🚀");

document.getElementById(
"username"
).value = "";

document.getElementById(
"password"
).value = "";

document.querySelectorAll(
'#accessBox input'
).forEach(box => {
box.checked = false;
});

loadUsers();

}

/* LOAD USERS */

async function loadUsers(){

const querySnapshot =
await getDocs(
collection(db,"users")
);

let html = "";

querySnapshot.forEach((docu)=>{

let limit =
docu.data().loginLimit
|| 999999;

let count =
docu.data().loginCount
|| 0;

let status =

count >= limit
&& limit != 999999

?

"locked"

:

"unlocked";

html += `

<div class="userbox">

<h3>👤 USER INFO</h3>

<p>
<b>Username:</b>
${docu.id}
</p>

<p>
<b>Password:</b>
${docu.data().password}
</p>

<p>
<b>Access:</b>

${docu.data().pageAccess
? docu.data().pageAccess.join(", ")
: "No Access"}

</p>

<p>
<b>Total Logins:</b>

${docu.data().loginHistory
? docu.data().loginHistory.length
: 0}

</p>

<p>

<b>Status:</b>

<span style="
color:
${status=="locked"
? "red"
: "lime"};
font-weight:bold;
">

${status=="locked"
? "🔒 Locked"
: "🔓 Active"}

</span>

</p>

<p>

<b>Login Limit:</b>

${limit >= 999999
? "Unlimited"
: limit}

</p>

${
limit != 999999

?

`

<p>

<b>Current Login:</b>

${count}

</p>

`

:

""

}

<button
onclick="toggleHistory('${docu.id}')">

📜 History

</button>

<button
onclick="changeAccess('${docu.id}')">

🔄 Access

</button>

<button
onclick="toggleLock('${docu.id}')">

${limit != 999999
? "🔓 Unlock"
: "🔒 Lock"}

</button>

<button
onclick="removeUser('${docu.id}')">

❌ Remove

</button>

<div
id="history-${docu.id}"
style="
display:none;
margin-top:15px;
">

${
docu.data().loginHistory
&&
docu.data().loginHistory.length > 0

?

docu.data().loginHistory.map(log => `

<p>📅 ${log.date}</p>

<p>🕒 ${log.time}</p>

<p>🚀 ${log.page}</p>

<hr>

`).join("")

:

"No Login"

}

</div>

</div>

`;

});

document.getElementById(
"history"
).innerHTML = html;

}

/* HISTORY */

window.toggleHistory =
function(id){

const box =
document.getElementById(
"history-" + id
);

box.style.display =

box.style.display
== "none"

?

"block"

:

"none";

}

/* CHANGE ACCESS */

window.changeAccess =
async function(username){

const userRef =
doc(db,"users",username);

const popup =
document.createElement("div");

popup.className =
"popup";

popup.innerHTML =

`

<div class="popupbox">

<div class="close"
onclick="this.parentElement.parentElement.remove()">

✖

</div>

<h2 style="color:cyan;">
🔄 Change Access
</h2>

<label class="check">

<input
type="checkbox"
value="jee">

<span>
🔥 JEE
</span>

</label>

<label class="check">

<input
type="checkbox"
value="12th">

<span>
📚 12TH
</span>

</label>

<label class="check">

<input
type="checkbox"
value="topperzone">

<span>
🚀 TOPPERZONE
</span>

</label>

<button id="saveAccess">
✅ SAVE
</button>

</div>

`;

document.body.appendChild(
popup
);

document.getElementById(
"saveAccess"
).onclick =
async function(){

let access =

Array.from(

popup.querySelectorAll(
'input:checked'
)

).map(
checkbox => checkbox.value
);

await updateDoc(userRef,{

pageAccess:access

});

alert(
"Access Changed ✅"
);

popup.remove();

loadUsers();

};

}

/* LOCK / UNLOCK */

window.toggleLock =
async function(username){

const userRef =
doc(db,"users",username);

const userSnap =
await getDoc(userRef);

const limit =
userSnap.data().loginLimit
|| 999999;

/* UNLOCK */

if(limit != 999999){

await updateDoc(userRef,{

status:"unlocked",

loginLimit:999999,

loginCount:0

});

alert("Account Unlocked ✅");

loadUsers();

return;

}

/* POPUP */

const popup =
document.createElement("div");

popup.className =
"popup";

popup.innerHTML =

`

<div class="popupbox">

<div class="close"
onclick="this.parentElement.parentElement.remove()">

✖

</div>

<h2 style="color:cyan;">
🔒 Login Limit
</h2>

<input
type="number"
id="limitInput"
placeholder="Enter Limit">

<br>

<button id="limitBtn">
✅ SAVE
</button>

</div>

`;

document.body.appendChild(
popup
);

document.getElementById(
"limitBtn"
).onclick =
async function(){

let limit =
parseInt(

document.getElementById(
"limitInput"
).value

);

if(
isNaN(limit)
||
limit <= 0
){

alert(
"Enter Valid Number ❌"
);

return;

}

await updateDoc(userRef,{

status:"unlocked",

loginLimit:limit,

loginCount:0

});

alert(
"Limit Set ✅"
);

popup.remove();

loadUsers();

};

}

/* REMOVE USER */

window.removeUser =
async function(username){

await deleteDoc(
doc(db,"users",username)
);

alert("User Removed ❌");

loadUsers();

}

loadUsers();

</script>

</body>
  </html>
