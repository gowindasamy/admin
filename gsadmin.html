<!DOCTYPE html>
<html>
<head>
<title>👑 Admin Page</title>

<style>

body{
margin:0;
padding:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
overflow:hidden;
z-index:-1;
}

.stars::before,
.stars::after{

content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background-image:
radial-gradient(white 2px, transparent 2px),
radial-gradient(cyan 3px, transparent 3px),
radial-gradient(lime 2px, transparent 2px),
radial-gradient(yellow 4px, transparent 4px);

background-size:
200px 200px,
300px 300px,
250px 250px,
400px 400px;

animation:starsMove 60s linear infinite;

opacity:0.9;

}

h1{
margin-top:50px;
font-size:50px;
animation:rainbow 4s linear infinite;
text-shadow:
0 0 10px red,
0 0 20px cyan,
0 0 30px lime;
}

input{
padding:15px;
margin:12px;
width:280px;
font-size:18px;
border:none;
border-radius:12px;
outline:none;
background:rgba(255,255,255,0.08);
color:white;
box-shadow:0 0 20px lime;
}

button{
padding:15px 30px;
background:linear-gradient(
45deg,
lime,
cyan
);
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
font-weight:bold;
color:black;
box-shadow:0 0 25px cyan;
transition:0.3s;
margin:8px;
}

button:hover{
transform:scale(1.1);
}

.userbox{
background:rgba(0,0,0,0.75);
width:340px;
margin:20px auto;
padding:18px;
border-radius:15px;
box-shadow:0 0 20px cyan;
word-wrap:break-word;
border:2px solid cyan;
}

hr{
border:1px solid cyan;
}

@keyframes rainbow{

0%{color:red;}
20%{color:orange;}
40%{color:yellow;}
60%{color:lime;}
80%{color:cyan;}
100%{color:magenta;}

}

@keyframes starsMove{

from{
transform:translateY(0);
}

to{
transform:translateY(1000px);
}

}

</style>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</head>

<body>

<div class="stars"></div>

<h1>👑 ADMIN PAGE 👑</h1>

<input type="text"
id="username"
placeholder="Create Username">

<br>

<input type="password"
id="password"
placeholder="Create Password">

<br>

<button onclick="saveUser()">
🚀 Create Login
</button>

<h2 style="color:cyan;">
📜 User Information
</h2>

<div id="history"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
collection,
getDocs,
deleteDoc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAV9WmHR_cY01i3UMLpwlbymjjz_sQT_80",

authDomain: "tngslogin.firebaseapp.com",

projectId: "tngslogin",

storageBucket: "tngslogin.firebasestorage.app",

messagingSenderId: "552680193680",

appId: "1:552680193680:web:54db58e0e418a2b63aa215"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.saveUser = async function(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

await setDoc(doc(db,"users",username),{

password: password,

status:"unlocked",

loginLimit:999999,

loginCount:0

});

alert("Login Created 🚀");

document.getElementById("username").value = "";

document.getElementById("password").value = "";

loadUsers();

}

async function loadUsers(){

const querySnapshot =
await getDocs(collection(db,"users"));

let html = "";

querySnapshot.forEach((docu)=>{

html += `

<div class="userbox"
data-user="${docu.id}">

<h3>👤 User Information</h3>

<p><b>Username:</b> ${docu.id}</p>

<p><b>Password:</b> ${docu.data().password}</p>

<p>

<b>Total Logins:</b>

${docu.data().loginHistory
? docu.data().loginHistory.length
: 0}

</p>

<p class="hideDownload">

<b>Status:</b>

<span style="
color:
${docu.data().status == "locked"
? "red"
: "lime"};
font-weight:bold;
">

${docu.data().status == "locked"
? "🔒 Locked"
: "🔓 Not Locked"}

</span>

</p>

<p class="hideDownload">

<b>Login Limit:</b>

${
docu.data().loginLimit >= 999999
? "No Limit Set"
: docu.data().loginLimit
}

</p>

${
docu.data().status == "locked"

?

`

<p class="hideDownload">

<b>Current Login:</b>

${docu.data().loginCount || 0}

</p>

`

:

""

}

<h3 style="color:cyan;">
📅 Login Details
</h3>

${
docu.data().loginHistory
&& docu.data().loginHistory.length > 2

?

`

<button onclick="toggleHistory('${docu.id}')">
📜 View Login History
</button>

<div id="history-${docu.id}"
style="display:none;">

${docu.data().loginHistory.map(log => `

<p>📅 ${log.date}</p>

<p>🕒 ${log.time}</p>

<hr>

`).join("")}

</div>

`

:

docu.data().loginHistory

? docu.data().loginHistory.map(log => `

<p>📅 ${log.date}</p>

<p>🕒 ${log.time}</p>

<hr>

`).join("")

: "No Login"

}

<button onclick="toggleLock('${docu.id}','${docu.data().status}')">

${docu.data().status == "locked"
? "🔓 Unlock"
: "🔒 Lock"}

</button>

<button onclick="downloadUser('${docu.id}')">
📥 Download
</button>

<button onclick="removeUser('${docu.id}')">
❌ Remove User
</button>

</div>

`;

});

document.getElementById("history").innerHTML = html;

}

window.toggleHistory = function(id){

const box =
document.getElementById(
"history-" + id
);

if(box.style.display == "none"){

box.style.display = "block";

}

else{

box.style.display = "none";

}

}

window.toggleLock = async function(username,status){

if(status == "locked"){

await updateDoc(doc(db,"users",username),{

status:"unlocked",
loginCount:0,
loginLimit:999999

});

alert("Account Unlocked ✅");

loadUsers();

}

else{

const popup =
document.createElement("div");

popup.style.position = "fixed";
popup.style.top = "0";
popup.style.left = "0";
popup.style.width = "100%";
popup.style.height = "100%";
popup.style.background =
"rgba(0,0,0,0.8)";
popup.style.display = "flex";
popup.style.justifyContent =
"center";
popup.style.alignItems =
"center";
popup.style.zIndex = "9999";

const box =
document.createElement("div");

box.style.background = "black";
box.style.padding = "25px";
box.style.borderRadius = "15px";
box.style.boxShadow =
"0 0 20px cyan";
box.style.textAlign = "center";
box.style.width = "300px";

const title =
document.createElement("h2");

title.innerHTML =
"🔒 Enter Login Limit";

title.style.color = "cyan";

const input =
document.createElement("input");

input.type = "number";

input.placeholder =
"Enter Number";

input.inputMode = "numeric";

const btn =
document.createElement("button");

btn.innerHTML = "✅ OK";

btn.onclick = async function(){

let limit =
Number(input.value);

if(!limit){

alert("Enter Valid Number ❌");

return;

}

await updateDoc(doc(db,"users",username),{

status:"unlocked",
loginLimit:limit,
loginCount:0

});

document.body.removeChild(popup);

loadUsers();

}

box.appendChild(title);
box.appendChild(input);
box.appendChild(btn);

popup.appendChild(box);

document.body.appendChild(popup);

input.focus();

}

}

window.removeUser = async function(username){

await deleteDoc(doc(db,"users",username));

alert("User Removed ❌");

loadUsers();

}

window.downloadUser = async function(username){

const original =
document.querySelector(
`[data-user="${username}"]`
);

const clone =
original.cloneNode(true);

clone.querySelectorAll("button")
.forEach(btn => btn.remove());

clone.querySelectorAll(".hideDownload")
.forEach(el => {

el.remove();

});

const hiddenHistory =
clone.querySelectorAll(
'[id^="history-"]'
);

hiddenHistory.forEach(box => {

box.style.display = "block";

});

clone.style.position = "fixed";
clone.style.top = "-9999px";

document.body.appendChild(clone);

html2canvas(clone,{

backgroundColor:"#000000",
scale:2

}).then(canvas => {

canvas.toBlob(function(blob){

const link =
document.createElement("a");

link.download =
username + "_logindetails.jpg";

link.href =
URL.createObjectURL(blob);

link.click();

document.body.removeChild(clone);

},"image/jpeg",1.0);

});

}

loadUsers();

</script>

</body>
</html>
