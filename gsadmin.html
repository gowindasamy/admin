<!DOCTYPE html>
<html>
<head>
<title>👑 Admin Page</title>

<style>

body{
margin:0;
padding:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

/* DIGITAL WAVE BACKGROUND */

#wavebg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
background:black;
}

/* Wave 1 */

#wavebg::before{

content:"";

position:absolute;
top:20%;
left:-50%;

width:200%;
height:300px;

background:
rgba(0,255,255,0.15);

border-radius:45%;

filter:blur(60px);

animation:waveMove 10s linear infinite;

}

/* Wave 2 */

#wavebg::after{

content:"";

position:absolute;
bottom:10%;
left:-50%;

width:200%;
height:250px;

background:
rgba(0,255,0,0.12);

border-radius:40%;

filter:blur(70px);

animation:waveMove2 14s linear infinite;

}

/* Animations */

@keyframes waveMove{

0%{
transform:
translateX(0)
translateY(0)
rotate(0deg);
}

50%{
transform:
translateX(10%)
translateY(20px)
rotate(2deg);
}

100%{
transform:
translateX(0)
translateY(0)
rotate(0deg);
}

}

@keyframes waveMove2{

0%{
transform:
translateX(0)
translateY(0)
rotate(0deg);
}

50%{
transform:
translateX(-10%)
translateY(-20px)
rotate(-2deg);
}

100%{
transform:
translateX(0)
translateY(0)
rotate(0deg);
}

}

/* Title */

h1{
margin-top:50px;
font-size:50px;
animation:rainbow 4s linear infinite;
text-shadow:
0 0 10px red,
0 0 20px cyan,
0 0 30px lime;
}

/* Inputs */

input{
padding:15px;
margin:12px;
width:280px;
font-size:18px;
border:none;
border-radius:12px;
outline:none;
background:rgba(255,255,255,0.08);
color:white;
box-shadow:0 0 20px cyan;
}

/* Buttons */

button{
padding:15px 30px;
background:linear-gradient(
45deg,
lime,
cyan
);
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
font-weight:bold;
color:black;
box-shadow:0 0 25px cyan;
transition:0.3s;
margin:8px;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 35px lime;
}

/* User Box */

.userbox{
background:rgba(0,0,0,0.75);
width:340px;
margin:20px auto;
padding:18px;
border-radius:15px;
box-shadow:0 0 20px cyan;
word-wrap:break-word;
border:2px solid cyan;
backdrop-filter:blur(6px);
}

hr{
border:1px solid cyan;
}

@keyframes rainbow{

0%{color:red;}
20%{color:orange;}
40%{color:yellow;}
60%{color:lime;}
80%{color:cyan;}
100%{color:magenta;}

}

</style>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</head>

<body>

<div id="wavebg"></div>

<h1>👑 ADMIN PAGE 👑</h1>

<input type="text"
id="username"
placeholder="Create Username">

<br>

<input type="password"
id="password"
placeholder="Create Password">

<br>

<button onclick="saveUser()">
🚀 Create Login
</button>

<h2 style="color:cyan;">
📜 User Information
</h2>

<div id="history"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
collection,
getDocs,
deleteDoc,
updateDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAV9WmHR_cY01i3UMLpwlbymjjz_sQT_80",

authDomain: "tngslogin.firebaseapp.com",

projectId: "tngslogin",

storageBucket: "tngslogin.firebasestorage.app",

messagingSenderId: "552680193680",

appId: "1:552680193680:web:54db58e0e418a2b63aa215"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* CREATE USER */

window.saveUser = async function(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

await setDoc(doc(db,"users",username),{

password: password,

status:"unlocked",

loginLimit:999999,

loginCount:0,

loginHistory:[]

});

alert("Login Created 🚀");

document.getElementById("username").value = "";

document.getElementById("password").value = "";

loadUsers();

}

/* LOAD USERS */

async function loadUsers(){

const querySnapshot =
await getDocs(collection(db,"users"));

let html = "";

querySnapshot.forEach((docu)=>{

let limit =
docu.data().loginLimit || 999999;

let count =
docu.data().loginCount || 0;

let status =
count >= limit
&& limit != 999999

? "locked"

: "unlocked";

html += `

<div class="userbox"
data-user="${docu.id}">

<h3>👤 User Information</h3>

<p><b>Username:</b> ${docu.id}</p>

<p><b>Password:</b> ${docu.data().password}</p>

<p>

<b>Total Logins:</b>

${docu.data().loginHistory
? docu.data().loginHistory.length
: 0}

</p>

<p class="hideDownload">

<b>Status:</b>

<span style="
color:
${status == "locked"
? "red"
: "lime"};
font-weight:bold;
">

${status == "locked"
? "🔒 Locked"
: "🔓 Not Locked"}

</span>

</p>

<p class="hideDownload">

<b>Login Limit:</b>

${
limit >= 999999
? "No Limit Set"
: limit
}

</p>

${
limit != 999999

?

`

<p class="hideDownload">

<b>Current Login:</b>

${count}

</p>

`

:

""

}

<h3 style="color:cyan;">
📅 Login Details
</h3>

${
docu.data().loginHistory
&& docu.data().loginHistory.length > 2

?

`

<button onclick="toggleHistory('${docu.id}')">
📜 View Login History
</button>

<div id="history-${docu.id}"
style="display:none;">

${docu.data().loginHistory.map(log => `

<p>📅 ${log.date}</p>

<p>🕒 ${log.time}</p>

<hr>

`).join("")}

</div>

`

:

docu.data().loginHistory

? docu.data().loginHistory.map(log => `

<p>📅 ${log.date}</p>

<p>🕒 ${log.time}</p>

<hr>

`).join("")

: "No Login"

}

<button onclick="toggleLock('${docu.id}')">

${
limit != 999999
? "🔓 Unlock"
: "🔒 Lock"
}

</button>

<button onclick="downloadUser('${docu.id}')">
📥 Download
</button>

<button onclick="removeUser('${docu.id}')">
❌ Remove User
</button>

</div>

`;

});

document.getElementById("history").innerHTML = html;

}

/* VIEW HISTORY */

window.toggleHistory = function(id){

const box =
document.getElementById(
"history-" + id
);

box.style.display =
box.style.display == "none"
? "block"
: "none";

}

/* LOCK / UNLOCK */

window.toggleLock = async function(username){

const userRef =
doc(db,"users",username);

const userSnap =
await getDoc(userRef);

const limit =
userSnap.data().loginLimit || 999999;

/* UNLOCK */

if(limit != 999999){

await updateDoc(userRef,{

status:"unlocked",
loginLimit:999999,
loginCount:0

});

alert("Account Unlocked ✅");

loadUsers();

return;

}

/* LOCK POPUP */

const popup =
document.createElement("div");

popup.style.position = "fixed";
popup.style.top = "0";
popup.style.left = "0";
popup.style.width = "100%";
popup.style.height = "100%";
popup.style.background =
"rgba(0,0,0,0.85)";
popup.style.display = "flex";
popup.style.justifyContent =
"center";
popup.style.alignItems =
"center";
popup.style.zIndex = "9999";

const box =
document.createElement("div");

box.style.background = "#000";
box.style.padding = "25px";
box.style.borderRadius = "15px";
box.style.boxShadow =
"0 0 25px cyan";
box.style.textAlign = "center";
box.style.width = "300px";
box.style.position = "relative";

/* CLOSE BUTTON */

const closeBtn =
document.createElement("span");

closeBtn.innerHTML = "✖";

closeBtn.style.position = "absolute";
closeBtn.style.top = "10px";
closeBtn.style.right = "15px";
closeBtn.style.color = "red";
closeBtn.style.fontSize = "28px";
closeBtn.style.cursor = "pointer";
closeBtn.style.fontWeight = "bold";

closeBtn.onclick = function(){

document.body.removeChild(popup);

};

const title =
document.createElement("h2");

title.innerHTML =
"🔒 Enter Login Limit";

title.style.color = "cyan";

const input =
document.createElement("input");

input.type = "number";

input.placeholder =
"Enter Number";

input.inputMode = "numeric";

const btn =
document.createElement("button");

btn.innerHTML = "✅ OK";

btn.onclick = async function(){

let limit =
parseInt(input.value);

/* EMPTY */

if(input.value.trim() == ""){

alert("Enter Valid Number ❌");

return;

}

/* INVALID */

if(
isNaN(limit)
|| limit <= 0
){

alert(
"Enter Number Above 0 ❌"
);

return;

}

/* SET LIMIT */

await updateDoc(userRef,{

status:"unlocked",
loginLimit:limit,
loginCount:0

});

alert(
"Limit Set : "
+ limit
);

document.body.removeChild(popup);

loadUsers();

return;

}

box.appendChild(closeBtn);

box.appendChild(title);

box.appendChild(input);

box.appendChild(btn);

popup.appendChild(box);

document.body.appendChild(popup);

input.focus();

}

/* REMOVE USER */

window.removeUser = async function(username){

await deleteDoc(doc(db,"users",username));

alert("User Removed ❌");

loadUsers();

}

/* DOWNLOAD JPG */

window.downloadUser = async function(username){

const original =
document.querySelector(
`[data-user="${username}"]`
);

const clone =
original.cloneNode(true);

clone.querySelectorAll("button")
.forEach(btn => btn.remove());

clone.querySelectorAll(".hideDownload")
.forEach(el => {

el.remove();

});

const hiddenHistory =
clone.querySelectorAll(
'[id^="history-"]'
);

hiddenHistory.forEach(box => {

box.style.display = "block";

});

clone.style.position = "fixed";
clone.style.top = "-9999px";

document.body.appendChild(clone);

html2canvas(clone,{

backgroundColor:"#000000",
scale:2

}).then(canvas => {

canvas.toBlob(function(blob){

const link =
document.createElement("a");

link.download =
username + "_logindetails.jpg";

link.href =
URL.createObjectURL(blob);

link.click();

document.body.removeChild(clone);

},"image/jpeg",1.0);

});

}

loadUsers();

</script>

</body>
</html>
