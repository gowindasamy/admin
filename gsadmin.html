<!DOCTYPE html>
<html>
<head>

<title>👑 ADMIN PAGE 👑</title>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
margin:0;
padding:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

/* DIGITAL BACKGROUND */

#wavebg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
background:black;
z-index:-1;
}

#wavebg::before{

content:"";

position:absolute;

top:20%;
left:-50%;

width:200%;
height:300px;

background:
rgba(0,255,255,0.15);

border-radius:45%;

filter:blur(60px);

animation:waveMove 10s linear infinite;

}

#wavebg::after{

content:"";

position:absolute;

bottom:10%;
left:-50%;

width:200%;
height:250px;

background:
rgba(0,255,0,0.12);

border-radius:40%;

filter:blur(70px);

animation:waveMove2 14s linear infinite;

}

/* MAIN */

.mainbox{

width:100%;

padding:20px;

text-align:center;

}

/* TITLE */

h1{

margin-top:40px;

font-size:55px;

animation:rainbow 4s linear infinite;

text-shadow:
0 0 10px red,
0 0 20px cyan,
0 0 30px lime;

}

/* INPUTS */

input,
select{

padding:15px;
margin:10px;

width:280px;

font-size:18px;

border:none;
border-radius:12px;

outline:none;

background:
rgba(255,255,255,0.08);

color:white;

box-shadow:
0 0 20px cyan;

}

option{

background:black;
color:white;

}

/* BUTTON */

button{

padding:12px 20px;

font-size:16px;

margin:6px;

width:220px;

background:
linear-gradient(
45deg,
lime,
cyan
);

border:none;
border-radius:12px;

cursor:pointer;

font-weight:bold;

color:black;

box-shadow:
0 0 20px cyan;

transition:0.3s;

}

button:hover{

transform:scale(1.05);

}

/* USER AREA */

#history{

width:100%;

}

/* USER BOX */

.userbox{

background:
rgba(0,0,0,0.88);

width:340px;

margin:25px auto;

padding:25px;

border-radius:20px;

box-shadow:
0 0 25px cyan;

border:2px solid cyan;

backdrop-filter:blur(10px);

text-align:center;

}

.userbox p{

margin:10px 0;

font-size:18px;

}

hr{

border:1px solid cyan;

margin:10px 0;

}

/* ANIMATIONS */

@keyframes rainbow{

0%{color:red;}
20%{color:orange;}
40%{color:yellow;}
60%{color:lime;}
80%{color:cyan;}
100%{color:magenta;}

}

@keyframes waveMove{

0%{
transform:
translateX(0)
translateY(0)
rotate(0deg);
}

50%{
transform:
translateX(10%)
translateY(20px)
rotate(2deg);
}

100%{
transform:
translateX(0)
translateY(0)
rotate(0deg);
}

}

@keyframes waveMove2{

0%{
transform:
translateX(0)
translateY(0)
rotate(0deg);
}

50%{
transform:
translateX(-10%)
translateY(-20px)
rotate(-2deg);
}

100%{
transform:
translateX(0)
translateY(0)
rotate(0deg);
}

}

</style>

</head>

<body>

<div id="wavebg"></div>

<div class="mainbox">

<h1>
👑 ADMIN PAGE 👑
</h1>

<input
type="text"
id="username"
placeholder="Create Username">

<br>

<input
type="password"
id="password"
placeholder="Create Password">

<br>

<select id="access">

<option value="jee">
JEE
</option>

<option value="12th">
12th
</option>

<option value="both">
JEE + 12th
</option>

</select>

<br>

<button onclick="saveUser()">
🚀 Create Login
</button>

<h2 style="
color:cyan;
margin-top:25px;
font-size:30px;
">

📜 User Information

</h2>

<div id="history"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
setDoc,
collection,
getDocs,
deleteDoc,
updateDoc,
getDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyAV9WmHR_cY01i3UMLpwlbymjjz_sQT_80",

authDomain:
"tngslogin.firebaseapp.com",

projectId:
"tngslogin",

storageBucket:
"tngslogin.firebasestorage.app",

messagingSenderId:
"552680193680",

appId:
"1:552680193680:web:54db58e0e418a2b63aa215"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* CREATE USER */

window.saveUser =
async function(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

let access =
document.getElementById("access").value;

if(
username.trim()==""
||
password.trim()==""
){

alert("Enter Username & Password ❌");

return;

}

await setDoc(
doc(db,"users",username),
{

password:password,

pageAccess:access,

status:"unlocked",

loginLimit:999999,

loginCount:0,

loginHistory:[]

}

);

alert("Login Created 🚀");

document.getElementById("username").value="";

document.getElementById("password").value="";

loadUsers();

}

/* LOAD USERS */

async function loadUsers(){

const querySnapshot =
await getDocs(
collection(db,"users")
);

let html = "";

querySnapshot.forEach((docu)=>{

let limit =
docu.data().loginLimit || 999999;

let count =
docu.data().loginCount || 0;

let status =
count >= limit
&& limit != 999999

? "locked"

: "unlocked";

html += `

<div class="userbox">

<h3 style="
font-size:32px;
color:cyan;
margin-bottom:20px;
">

👤 User Information

</h3>

<p>
<b>Username:</b>
${docu.id}
</p>

<p>
<b>Password:</b>
${docu.data().password}
</p>

<p>
<b>Page Access:</b>
${docu.data().pageAccess}
</p>

<p>
<b>Total Logins:</b>
${
docu.data().loginHistory
? docu.data().loginHistory.length
: 0
}
</p>

<button
onclick="toggleHistory('${docu.id}')">

📜 Login History

</button>

<div
id="history-${docu.id}"
style="
display:none;
margin-top:20px;
">

${
docu.data().loginHistory
&&
docu.data().loginHistory.length > 0

?

docu.data().loginHistory.map(log => `

<p>

📅 ${log.date}

<br>

🕒 ${log.time}

</p>

<hr>

`).join("")

:

"No Login History"

}

</div>

<p>

<b>Status:</b>

<span style="
color:
${
status=="locked"
? "red"
: "lime"
};
font-weight:bold;
">

${
status=="locked"
? "🔒 Locked"
: "🔓 Not Locked"
}

</span>

</p>

<p>

<b>Login Limit:</b>

${
limit >= 999999
? "No Limit Set"
: limit
}

</p>

${
limit != 999999

?

`

<p>

<b>Current Login:</b>

${count}

</p>

`

:

""

}

<button
onclick="changeAccess('${docu.id}')">

🔄 Change Access

</button>

<br>

<button
onclick="toggleLock('${docu.id}')">

${
limit != 999999
? "🔓 Unlock"
: "🔒 Lock"
}

</button>

<button
onclick="downloadUser('${docu.id}')">

📥 Download

</button>

<br>

<button
onclick="removeUser('${docu.id}')">

❌ Remove User

</button>

</div>

`;

});

document.getElementById("history").innerHTML =
html;

}

/* LOGIN HISTORY */

window.toggleHistory =
function(id){

const box =
document.getElementById(
"history-" + id
);

box.style.display =
box.style.display == "none"
? "block"
: "none";

}

/* CHANGE ACCESS */

window.changeAccess =
async function(username){

const userRef =
doc(db,"users",username);

const choose =
prompt(

"Choose Access Type 👇\n\njee\n12th\nboth"

);

if(
!choose
) return;

if(
choose!="jee"
&&
choose!="12th"
&&
choose!="both"
){

alert("Invalid Type ❌");

return;

}

await updateDoc(userRef,{

pageAccess:choose

});

alert(
"Access Changed ✅"
);

loadUsers();

}

/* LOCK / UNLOCK */

window.toggleLock =
async function(username){

const userRef =
doc(db,"users",username);

const userSnap =
await getDoc(userRef);

const limit =
userSnap.data().loginLimit || 999999;

/* UNLOCK */

if(limit != 999999){

await updateDoc(userRef,{

status:"unlocked",

loginLimit:999999,

loginCount:0

});

alert("Account Unlocked ✅");

loadUsers();

return;

}

/* LOCK */

const value =
prompt(
"Enter Login Limit"
);

if(
value===null
) return;

let limitValue =
parseInt(value);

if(
isNaN(limitValue)
|| limitValue <= 0
){

alert(
"Enter Number Above 0 ❌"
);

return;

}

await updateDoc(userRef,{

status:"unlocked",

loginLimit:limitValue,

loginCount:0

});

alert(
"Limit Set : "
+ limitValue
);

loadUsers();

}

/* REMOVE USER */

window.removeUser =
async function(username){

await deleteDoc(
doc(db,"users",username)
);

alert("User Removed ❌");

loadUsers();

}

/* DOWNLOAD */

window.downloadUser =
async function(username){

alert(
"Download Feature Ready ✅"
);

}

loadUsers();

</script>

</body>
  </html>
