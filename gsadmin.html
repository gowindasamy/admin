<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Page</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050816;
    overflow-x:hidden;
    font-family:Arial, sans-serif;
    min-height:100vh;
    color:white;
    position:relative;
}

/* BIG STARS */

.star{
    position:absolute;
    border-radius:50%;
    background:white;
    animation:blink 2s infinite alternate;
}

@keyframes blink{
    from{
        opacity:0.3;
        transform:scale(1);
    }
    to{
        opacity:1;
        transform:scale(1.3);
    }
}

/* HEADER */

.header{
    text-align:center;
    padding-top:40px;
    z-index:2;
    position:relative;
}

.header h1{
    font-size:55px;
    color:#00f7ff;
    text-shadow:0 0 20px #00f7ff;
}

.header p{
    margin-top:10px;
    color:#aaa;
    font-size:20px;
}

/* USER CARD */

.container{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-bottom:80px;
    position:relative;
    z-index:2;
}

.history-card{
    width:350px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border:2px solid rgba(255,255,255,0.15);
    border-radius:30px;
    padding:30px;
    margin-top:40px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,255,255,0.2);
}

.profile{
    font-size:80px;
}

.username{
    font-size:35px;
    font-weight:bold;
    margin-top:10px;
    color:#00f7ff;
}

.title{
    margin-top:15px;
    font-size:32px;
    font-weight:bold;
}

.info{
    margin-top:20px;
    font-size:25px;
    color:#fff;
}

.line{
    width:100%;
    height:3px;
    background:#00f7ff;
    border-radius:10px;
    margin-top:25px;
}

/* BUTTONS */

.btn{
    width:100%;
    border:none;
    margin-top:25px;
    padding:22px;
    border-radius:25px;
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    color:black;
    background:linear-gradient(90deg,#00ff2a,#00e1ff);
}

.btn:hover{
    transform:scale(1.04);
}

.remove{
    background:linear-gradient(90deg,#ff2d2d,#ff7b00);
    color:white;
}

</style>
</head>
<body>

<!-- STARS -->

<script>

for(let i=0;i<80;i++){

    const star=document.createElement("div");

    star.classList.add("star");

    const size=Math.random()*8+4;

    star.style.width=size+"px";
    star.style.height=size+"px";

    star.style.left=Math.random()*100+"%";
    star.style.top=Math.random()*100+"%";

    star.style.animationDuration=
    (Math.random()*3+1)+"s";

    document.body.appendChild(star);
}

</script>

<!-- HEADER -->

<div class="header">
    <h1>⚡ ADMIN PAGE</h1>
    <p>User Login History</p>
</div>

<!-- USER HISTORY -->

<div class="container">

    <!-- USER 1 -->

    <div class="history-card" id="user1">

        <div class="profile">👤</div>

        <div class="username">
            GOWIND
        </div>

        <div class="title">
            📅 Login History
        </div>

        <div class="info">
            📅 28 April 2026
        </div>

        <div class="info">
            🕒 08:45 PM
        </div>

        <div class="line"></div>

        <button class="btn"
        onclick="downloadHistory('user1','gowind')">
            📥 Download JPG
        </button>

        <button class="btn remove"
        onclick="removeUser('user1')">
            ❌ Remove User
        </button>

    </div>

</div>

<script>

/* DOWNLOAD JPG */

async function downloadHistory(cardId, username){

    const card=document.getElementById(cardId);

    const canvas=await html2canvas(card,{
        backgroundColor:"#050816",
        scale:3
    });

    const image=
    canvas.toDataURL("image/jpeg",1.0);

    const link=document.createElement("a");

    link.href=image;

    link.download=username+"_history.jpg";

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);
}

/* REMOVE USER */

function removeUser(cardId){

    const card=document.getElementById(cardId);

    card.remove();
}

</script>

</body>
</html>
